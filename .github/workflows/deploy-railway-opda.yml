# OPDA-side deploy hook for the fork.
#
# Pushes to master deploy the fork's latest source to the `artalk` service
# in the Railway project that hosts opda-artalk. Stops the project from
# silently reverting to the upstream artalk/artalk-go image whenever a
# Railway env var changes (which previously wiped feat/sso-token-exchange
# on every redeploy).
#
# Required GitHub Actions secret on this repo:
#   RAILWAY_TOKEN  — Railway project token, scoped to the opda-artalk project.
#                    Create in Railway dashboard:
#                      Project Settings → Tokens → Create Token →
#                      name it "opda-artalk-ci" and copy the value.
#
# The workflow only runs on push to master in this fork; upstream
# ArtalkJS/Artalk is unaffected.

name: Deploy fork to Railway (opda-artalk)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'sparkling/Artalk'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service artalk --detach --ci
