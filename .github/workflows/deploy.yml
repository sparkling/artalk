# Deploy the Artalk fork to Fly.io on every push to main.
# Fly builds the Dockerfile and rolls out a single Machine (volume at /data).
#
# Replaces the old Docker Hub + Railway GraphQL chain: Railway's deploy API
# became unusable (every deploy mutation returned "Problem processing request"
# platform-side). `flyctl deploy` builds, deploys, and verifies the release in
# one reliable step.
#
# Requires secret FLY_API_TOKEN (a Fly deploy token scoped to opda-artalk).
# Guarded to the fork so the patch stays upstream-friendly.
name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once — the single-writer /data volume can only
# attach to one Machine at a time.
concurrency: deploy-opda-artalk

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'sparkling/Artalk'
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
