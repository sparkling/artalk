# Build the fork's Artalk container image and publish it to GitHub
# Container Registry. Railway's `artalk` service is configured to deploy
# from this image, so a successful push here triggers a Railway redeploy.
#
# Tags published:
#   ghcr.io/sparkling/artalk:latest       (always)
#   ghcr.io/sparkling/artalk:main         (always)
#   ghcr.io/sparkling/artalk:<short-sha>  (immutable, pin in Railway if rollbacks are needed)
#
# Auth: GHCR uses the workflow's built-in GITHUB_TOKEN. No extra secrets
# required. The repo's package settings make the image publicly pullable
# (default for public repos).
#
# Guarded with `if: github.repository == 'sparkling/Artalk'` so this
# workflow only runs in the fork — keeps the patch upstream-friendly.

name: Build & push image to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    if: github.repository == 'sparkling/Artalk'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/sparkling/artalk
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
