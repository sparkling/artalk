# Build the fork's Artalk container image and publish it to Docker Hub
# at sparklingideas/artalk. Railway's `artalk` service deploys from
# this image, so a successful push here makes the new build live on
# the next Railway pull / restart.
#
# Tags published per push to main:
#   sparklingideas/artalk:latest
#   sparklingideas/artalk:main
#   sparklingideas/artalk:<short-sha>   (immutable; pin for rollback)
#
# Required GH Actions secrets:
#   DOCKERHUB_USERNAME  Docker Hub user that owns sparklingideas/artalk
#   DOCKERHUB_TOKEN     Docker Hub PAT with read/write/delete scope on
#                       the artalk repo
#
# Guarded with `if: github.repository == 'sparkling/Artalk'` so this
# workflow only runs on the fork — keeps the patch upstream-friendly.

name: Build & push image to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    if: github.repository == 'sparkling/Artalk'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/sparklingideas/artalk
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
