# Build & publish the fork's Artalk container image to Docker Hub on
# every push to main, then update Railway to deploy that exact image
# by short SHA so we never run :latest in production.
#
# Why no :latest tag: a floating tag makes "what's deployed?" ambiguous
# and breaks bisecting. Consumers (Railway, anyone else) pin to the
# immutable :<short-sha> tag. The :main tag still gets published for
# casual `docker pull`, but the actual deploy uses SHA.
#
# Tags published per push to main:
#   sparklingideas/artalk:main           moving pointer, convenience only
#   sparklingideas/artalk:<short-sha>    immutable, what Railway deploys
#
# Required GH Actions secrets (already set on this repo):
#   DOCKERHUB_USERNAME=sparklingideas
#   DOCKERHUB_TOKEN=<Docker Hub PAT, read/write/delete on artalk>
#   RAILWAY_TOKEN=<Railway project token, scoped to opda-artalk>
#
# Guarded with `if: github.repository == 'sparkling/Artalk'` so this
# workflow only runs on the fork — keeps the patch upstream-friendly.

name: Build → Docker Hub → Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: docker.io/sparklingideas/artalk
  RAILWAY_SERVICE_ID: dc959546-192c-4fc6-b887-b4f7bc3b0dc8
  RAILWAY_ENVIRONMENT_ID: 37befc8b-606e-4b61-b0b3-8c4b225b3c7b

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'sparkling/Artalk'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Deploy the immutable :<short-sha> image to Railway
        run: |
          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
          IMAGE_REF="${IMAGE}:${SHORT_SHA}"
          echo "Deploying $IMAGE_REF to Railway"

          # Step 1 — PIN the service source to the immutable :<short-sha>.
          # serviceInstanceUpdate only updates config; it does NOT roll out.

          RESP=$(curl -sS --fail \
            -X POST https://backboard.railway.com/graphql/v2 \
            -H "Project-Access-Token: ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "query": "mutation(\$svc: String!, \$env: String!, \$src: ServiceSourceInput) { serviceInstanceUpdate(serviceId: \$svc, environmentId: \$env, input: { source: \$src }) }",
            "variables": {
              "svc": "${RAILWAY_SERVICE_ID}",
              "env": "${RAILWAY_ENVIRONMENT_ID}",
              "src": { "image": "${IMAGE_REF}" }
            }
          }
          EOF
          )
          echo "Railway source-update response: $RESP"
          if ! echo "$RESP" | grep -q '"serviceInstanceUpdate":true'; then
            echo "::error::Railway service-update did not return true"
            exit 1
          fi

          # Step 2 — ROLL OUT the pinned image. serviceInstanceDeploy with
          # latestCommit:true = "pull the configured source's latest image and
          # deploy it" — the same mutation the official `railway redeploy` uses.
          # (The old serviceInstanceRedeploy is broken: "Problem processing
          # request".) This is a SINGLE deploy, so nothing races the /data volume.
          DEPLOY=$(curl -sS --fail \
            -X POST https://backboard.railway.com/graphql/v2 \
            -H "Project-Access-Token: ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "query": "mutation(\$svc: String!, \$env: String!) { serviceInstanceDeploy(serviceId: \$svc, environmentId: \$env, latestCommit: true) }",
            "variables": {
              "svc": "${RAILWAY_SERVICE_ID}",
              "env": "${RAILWAY_ENVIRONMENT_ID}"
            }
          }
          EOF
          )
          echo "Railway deploy response: $DEPLOY"
          if ! echo "$DEPLOY" | grep -q '"serviceInstanceDeploy":true'; then
            echo "::error::Railway serviceInstanceDeploy did not return true"
            exit 1
          fi
